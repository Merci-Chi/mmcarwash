<html lang="en">
<head>
<meta charset="utf-8"/>

<title>Magic Mobile Car Wash Gallery</title>

<style>
:root{--navy:#17365f;--navy-dark:#102a4c;--red:#ef2b2d;--white:#fff;--focus:#ffd76a}
*{box-sizing:border-box}
html{min-height:100%;background:#f4f7fb}
body{margin:0;min-width:320px;min-height:100vh;background:#f4f7fb;color:var(--navy);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
a{color:inherit;text-decoration:none}
a:focus,a:focus-visible{outline:3px solid var(--focus);outline-offset:3px}
.gallery-page{width:min(100%,1240px);margin:0 auto;padding:28px 20px 56px}
.gallery-top{margin-bottom:24px}
.back-home{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:10px 15px;border:1px solid rgba(23,54,95,.18);border-radius:999px;background:#fff;font-size:13px;font-weight:850;box-shadow:0 5px 15px rgba(16,42,76,.08)}
h1{margin:0;font-family:"Chicle",cursive;font-size:clamp(38px,4vw,52px);font-weight:400;line-height:1;text-align:right;white-space:nowrap}
.gallery-filters{display:flex;min-width:0;flex-wrap:wrap;justify-content:flex-start;gap:9px;margin:0}
.gallery-filter{min-height:42px;padding:10px 15px;border:1px solid rgba(23,54,95,.18);border-radius:999px;background:#fff;color:var(--navy);font:inherit;font-size:13px;font-weight:850;cursor:pointer;transition:.16s ease}
.gallery-filter:hover,.gallery-filter.is-active{border-color:var(--navy);background:var(--navy);color:#fff}
.gallery-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
.gallery-item{display:block;width:100%;aspect-ratio:4/3;padding:0;overflow:hidden;border:0;border-radius:18px;background:#dfe7f0;box-shadow:0 12px 28px rgba(16,42,76,.12);cursor:zoom-in}
.gallery-item:focus,.gallery-item:focus-visible,.gallery-filter:focus,.gallery-filter:focus-visible,:where(a[href],select,input:not([type="hidden"]),textarea,[tabindex]:not([tabindex="-1"])):focus,:where(a[href],select,input:not([type="hidden"]),textarea,[tabindex]:not([tabindex="-1"])):focus-visible{outline:3px solid var(--focus);outline-offset:3px}

.gallery-item[hidden]{display:none}
.gallery-item img{width:100%;height:100%;display:block;object-fit:cover}

.lightbox{position:fixed;inset:0;z-index:1000;display:none;place-items:center;padding:24px;background:rgba(4,9,18,.9);backdrop-filter:blur(5px)}
.lightbox.is-open{display:grid}
.lightbox img{max-width:min(96vw,1280px);max-height:88vh;display:block;object-fit:contain;border-radius:16px;background:#fff;box-shadow:0 28px 80px rgba(0,0,0,.5)}
.lightbox-close{position:fixed;top:18px;right:20px;width:48px;height:48px;padding:0;display:grid;place-items:center;border:1px solid rgba(255,255,255,.55);border-radius:50%;background:rgba(23,54,95,.95);color:#fff;font-family:Arial,sans-serif;font-size:31px;font-weight:400;line-height:1;cursor:pointer}.lightbox-nav{position:fixed;top:50%;z-index:2;width:52px;height:52px;display:grid;place-items:center;border:1px solid rgba(255,255,255,.55);border-radius:50%;background:rgba(23,54,95,.92);color:#fff;font-size:34px;line-height:1;cursor:pointer;transform:translateY(-50%);transition:background .16s ease,transform .16s ease}.lightbox-nav:hover{background:var(--navy)}.lightbox-prev{left:20px}.lightbox-next{right:20px}.lightbox-counter{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);padding:7px 12px;border-radius:999px;background:rgba(23,54,95,.9);color:#fff;font-size:13px;font-weight:800;letter-spacing:.02em}.lightbox img{touch-action:pan-y;user-select:none;-webkit-user-drag:none}@media(max-width:640px){.lightbox{padding:18px 10px}.lightbox-nav{width:44px;height:44px;font-size:29px;top:auto;bottom:16px;transform:none}.lightbox-nav:hover{background:var(--navy)}.lightbox-prev{left:16px}.lightbox-next{right:16px}.lightbox-counter{bottom:20px}.lightbox-close{top:12px;right:12px;width:44px;height:44px}}
@media(max-width:980px){.gallery-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:520px){.gallery-page{padding:18px 12px 34px}.gallery-filters{width:100%;justify-content:flex-start}.gallery-grid{grid-template-columns:1fr;gap:13px}.gallery-filter{font-size:12px;padding-inline:12px}}

.page-toolbar {
  width:min(calc(100% - 40px), 1240px);
  margin:18px auto 0;
  padding:14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  border-radius:14px;
  background:#fff;
  box-shadow:0 8px 24px rgba(16,42,76,.10);
}
.toolbar-left {
  display:flex;
  align-items:center;
  gap:16px;
  min-width:0;
}
.toolbar-left h1 {
  text-align:left;
}
.translate-panel {
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:10px;
  margin-left:auto;
}
.translate-panel label { margin:0; white-space:nowrap; font-weight:800; }
.translate-panel select {
  width:min(100%, 260px);
  height:48px;
  border:1px solid rgba(23,54,95,.22);
  border-radius:10px;
  padding:10px 12px;
  background:#fff;
  color:var(--navy);
  font:inherit;
  font-size:16px;
}
.translate-action {
  min-height:48px;
  padding:11px 18px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border:0;
  border-radius:10px;
  background:var(--navy);
  color:#fff;
  font:inherit;
  font-weight:900;
  text-align:center;
  text-decoration:none;
  cursor:pointer;
}
.translate-action:hover { filter:brightness(.94); }
@media (max-width:760px) {
  .page-toolbar {
    width:min(calc(100% - 24px), 1240px);
    align-items:stretch;
    flex-direction:column;
  }
  .toolbar-left {
    justify-content:flex-start;
    flex-wrap:wrap;
  }
  .translate-panel {
    width:100%;
    margin-left:0;
  }
}
@media (max-width:520px) {
  .toolbar-left {
    align-items:flex-start;
    flex-direction:column;
    gap:10px;
  }
  .translate-panel {
    align-items:stretch;
    flex-direction:column;
  }
  .translate-panel select, .translate-action { width:100%; max-width:none; }
}

#google_translate_element {
  position:fixed;
  width:1px;
  height:1px;
  overflow:hidden;
  clip:rect(0 0 0 0);
  clip-path:inset(50%);
  white-space:nowrap;
  pointer-events:none;
}
.goog-tooltip,
.goog-tooltip:hover,
.goog-te-balloon-frame,
iframe.goog-te-balloon-frame {
  display:none !important;
  visibility:hidden !important;
  opacity:0 !important;
  pointer-events:none !important;
}
.goog-text-highlight {
  background:transparent !important;
  box-shadow:none !important;
  border:0 !important;
}
body a[href]:focus,
body a[href]:focus-visible,
body select:focus,
body select:focus-visible,
body input:not([type="hidden"]):focus,
body input:not([type="hidden"]):focus-visible,
body textarea:focus,
body textarea:focus-visible,
body [tabindex]:not([tabindex="-1"]):focus,
body [tabindex]:not([tabindex="-1"]):focus-visible {
  outline:3px solid var(--focus) !important;
  outline-offset:3px !important;
}
</style>
</head>

<div aria-hidden="true" aria-label="Expanded gallery image" aria-modal="true" class="lightbox" id="gallery-lightbox" role="dialog">
<a aria-label="Close image" class="lightbox-close" href="#" role="button">×</a>
<a aria-label="Previous image" class="lightbox-nav lightbox-prev" href="#" role="button">‹</a>
<img alt="Expanded gallery photo" draggable="false" src=""/>
<a aria-label="Next image" class="lightbox-nav lightbox-next" href="#" role="button">›</a>
<div aria-live="polite" class="lightbox-counter"></div>
</div>
<script>
const filters=[...document.querySelectorAll('.gallery-filter')];
const items=[...document.querySelectorAll('.gallery-item')];
const lightbox=document.getElementById('gallery-lightbox');
const lightboxImage=lightbox.querySelector('img');
const closeButton=lightbox.querySelector('.lightbox-close');
const previousButton=lightbox.querySelector('.lightbox-prev');
const nextButton=lightbox.querySelector('.lightbox-next');
const counter=lightbox.querySelector('.lightbox-counter');
let currentIndex=0;
let touchStartX=0;
let touchStartY=0;
let touchEndX=0;
let touchEndY=0;
let lastFocusedGalleryItem=null;

function visibleItems(){return items.filter(item=>!item.hidden);}
function showImage(index){
  const available=visibleItems();
  if(!available.length)return;
  currentIndex=(index+available.length)%available.length;
  const item=available[currentIndex];
  lightboxImage.src=item.dataset.src;
  lightboxImage.alt=item.querySelector('img')?.alt||'Expanded gallery photo';
  counter.textContent=`${currentIndex+1} / ${available.length}`;
}
function openLightbox(item){
  const available=visibleItems();
  currentIndex=Math.max(0,available.indexOf(item));
  lastFocusedGalleryItem=item;
  showImage(currentIndex);
  lightbox.classList.add('is-open');
  lightbox.setAttribute('aria-hidden','false');
  document.body.style.overflow='hidden';
  closeButton.focus();
}
function closeLightbox(){
  lightbox.classList.remove('is-open');
  lightbox.setAttribute('aria-hidden','true');
  lightboxImage.src='';
  document.body.style.overflow='';
  lastFocusedGalleryItem?.focus?.();
}
function previousImage(){showImage(currentIndex-1);}
function nextImage(){showImage(currentIndex+1);}

filters.forEach(button=>button.addEventListener('click',event=>{
  event.preventDefault();
  filters.forEach(x=>x.classList.remove('is-active'));
  button.classList.add('is-active');
  const filter=button.dataset.filter;
  items.forEach(item=>{item.hidden=filter!=='All'&&item.dataset.category!==filter;});
}));
items.forEach(item=>item.addEventListener('click',event=>{
  event.preventDefault();
  openLightbox(item);
}));
closeButton.addEventListener('click',event=>{
  event.preventDefault();
  closeLightbox();
});
previousButton.addEventListener('click',event=>{
  event.preventDefault();
  event.stopPropagation();
  previousImage();
});
nextButton.addEventListener('click',event=>{
  event.preventDefault();
  event.stopPropagation();
  nextImage();
});
lightbox.addEventListener('click',event=>{if(event.target===lightbox)closeLightbox();});
document.addEventListener('keydown',event=>{
  if(!lightbox.classList.contains('is-open'))return;
  if(event.key==='Escape')closeLightbox();
  if(event.key==='ArrowLeft')previousImage();
  if(event.key==='ArrowRight')nextImage();
});
lightbox.addEventListener('touchstart',event=>{
  const touch=event.changedTouches[0];
  touchStartX=touch.screenX;
  touchStartY=touch.screenY;
},{passive:true});
lightbox.addEventListener('touchend',event=>{
  const touch=event.changedTouches[0];
  touchEndX=touch.screenX;
  touchEndY=touch.screenY;
  const deltaX=touchEndX-touchStartX;
  const deltaY=touchEndY-touchStartY;
  if(Math.abs(deltaX)>55&&Math.abs(deltaX)>Math.abs(deltaY)){
    deltaX<0?nextImage():previousImage();
  }
},{passive:true});

const LANGUAGE_STORAGE_KEY = 'magicMobileLanguage';
const GALLERY_LANGUAGES = [
  'ar', 'zh-CN', 'zh-TW', 'fr', 'de', 'ht', 'hi', 'it',
  'ja', 'ko', 'pl', 'pt', 'ru', 'es', 'ur', 'vi'
];

function getTranslateCookieLanguage() {
  const match = document.cookie.match(/(?:^|;\s*)googtrans=\/en\/([^;]+)/);
  return match ? decodeURIComponent(match[1]) : 'en';
}

function setTranslateCookie(language) {
  const value = '/en/' + language;
  document.cookie = 'googtrans=' + value + '; path=/; SameSite=Lax';
  if (location.hostname) {
    document.cookie = 'googtrans=' + value + '; path=/; domain=' + location.hostname + '; SameSite=Lax';
  }
}

function clearTranslateCookies() {
  const expires = 'Thu, 01 Jan 1970 00:00:00 GMT';
  const hostParts = location.hostname ? location.hostname.split('.') : [];
  const domains = ['', location.hostname];
  if (hostParts.length > 1) domains.push('.' + hostParts.slice(-2).join('.'));

  [...new Set(domains)].forEach(function (domain) {
    const domainPart = domain ? '; domain=' + domain : '';
    document.cookie = 'googtrans=; expires=' + expires + '; path=/' + domainPart;
    document.cookie = 'googtrans=; Max-Age=0; path=/' + domainPart;
  });
}

(function restoreSavedLanguageBeforeGoogleLoads() {
  const savedLanguage = localStorage.getItem(LANGUAGE_STORAGE_KEY) || 'en';
  const cookieLanguage = getTranslateCookieLanguage();

  if (savedLanguage === 'en') {
    if (cookieLanguage !== 'en') clearTranslateCookies();
    return;
  }

  if (GALLERY_LANGUAGES.includes(savedLanguage) && cookieLanguage !== savedLanguage) {
    setTranslateCookie(savedLanguage);
  }
}());

function googleTranslateElementInit() {
  new google.translate.TranslateElement({
    pageLanguage: 'en',
    includedLanguages: GALLERY_LANGUAGES.join(','),
    autoDisplay: false
  }, 'google_translate_element');
}

const galleryLanguage = document.getElementById('gallery-language');
const galleryTranslateButton = document.getElementById('gallery-translate-button');
const currentGalleryLanguage = localStorage.getItem(LANGUAGE_STORAGE_KEY) || getTranslateCookieLanguage();
galleryLanguage.value = GALLERY_LANGUAGES.includes(currentGalleryLanguage) || currentGalleryLanguage === 'en'
  ? currentGalleryLanguage
  : 'en';

galleryTranslateButton.addEventListener('click', function (event) {
  event.preventDefault();
  const language = galleryLanguage.value;

  if (language === 'en') {
    localStorage.removeItem(LANGUAGE_STORAGE_KEY);
    clearTranslateCookies();
    location.reload();
    return;
  }

  localStorage.setItem(LANGUAGE_STORAGE_KEY, language);
  setTranslateCookie(language);
  location.reload();
});

(function preserveLanguageForLocalNavigation() {
  function currentLanguage() {
    const googleSelect = document.querySelector('.goog-te-combo');
    if (googleSelect) return googleSelect.value || 'en';
    return localStorage.getItem(LANGUAGE_STORAGE_KEY)
      || getTranslateCookieLanguage()
      || 'en';
  }

  function syncLanguage() {
    const language = currentLanguage();
    if (language && language !== 'en') {
      localStorage.setItem(LANGUAGE_STORAGE_KEY, language);
      setTranslateCookie(language);
    } else {
      localStorage.removeItem(LANGUAGE_STORAGE_KEY);
      clearTranslateCookies();
    }
  }

  document.addEventListener('click', function (event) {
    const link = event.target.closest('a[href]');
    if (!link || link.target || link.hasAttribute('download')) return;
    const href = link.getAttribute('href');
    if (!href || href.startsWith('#') || href.startsWith('tel:') || href.startsWith('mailto:') || href.startsWith('sms:')) return;

    try {
      const url = new URL(href, location.href);
      if (url.origin === location.origin) syncLanguage();
    } catch (_) {}
  }, true);
}());

(function enableEnterForKeyboardControls() {
  document.addEventListener('keydown', function (event) {
    if (event.key !== 'Enter' || event.altKey || event.ctrlKey || event.metaKey || event.shiftKey) return;
    const target = event.target;
    if (!(target instanceof HTMLElement) || target.matches('[data-human-check]')) return;

    if (target.matches('input[type="checkbox"], input[type="radio"]')) {
      event.preventDefault();
      target.click();
    }
  });
}());

(function enforceDocumentTabNavigation() {
  const selector = [
    '.back-home',
    '#gallery-language',
    '#gallery-translate-button',
    '.gallery-filter:not([hidden])',
    '.gallery-item:not([hidden])'
  ].join(',');

  function pageTabStops() {
    return [...document.querySelectorAll(selector)].filter(function (element) {
      if (element.disabled || element.getAttribute('aria-hidden') === 'true') return false;
      const style = window.getComputedStyle(element);
      return style.display !== 'none' && style.visibility !== 'hidden' && element.getClientRects().length > 0;
    });
  }

  document.addEventListener('keydown', function (event) {
    if (event.key !== 'Tab' || lightbox.classList.contains('is-open')) return;
    const stops = pageTabStops();
    if (!stops.length) return;

    const activeIndex = stops.indexOf(document.activeElement);
    let nextIndex;
    if (event.shiftKey) {
      nextIndex = activeIndex <= 0 ? stops.length - 1 : activeIndex - 1;
    } else {
      nextIndex = activeIndex < 0 || activeIndex === stops.length - 1 ? 0 : activeIndex + 1;
    }

    event.preventDefault();
    stops[nextIndex].focus({preventScroll:true});
    stops[nextIndex].scrollIntoView({block:'nearest', inline:'nearest'});
  }, true);
}());

(function trapLightboxTabFocus() {
  const focusableSelector = 'a[href], select:not([disabled]), input:not([disabled]):not([type="hidden"]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])';
  document.addEventListener('keydown', function (event) {
    if (event.key !== 'Tab' || !lightbox.classList.contains('is-open')) return;
    const focusables = [...lightbox.querySelectorAll(focusableSelector)].filter(function (element) {
      const style = window.getComputedStyle(element);
      return style.display !== 'none' && style.visibility !== 'hidden' && element.getClientRects().length > 0;
    });
    if (!focusables.length) return;
    const currentIndex = focusables.indexOf(document.activeElement);
    const nextIndex = event.shiftKey
      ? (currentIndex <= 0 ? focusables.length - 1 : currentIndex - 1)
      : (currentIndex < 0 || currentIndex === focusables.length - 1 ? 0 : currentIndex + 1);
    event.preventDefault();
    focusables[nextIndex].focus();
  }, true);
}());

const removeGoogleFeedbackPopup = function () {
  document.querySelectorAll('.goog-tooltip, .goog-te-balloon-frame, iframe.goog-te-balloon-frame').forEach(function (element) {
    element.remove();
  });
};

removeGoogleFeedbackPopup();
new MutationObserver(removeGoogleFeedbackPopup).observe(document.documentElement, {
  childList: true,
  subtree: true
});
</script>
<script async="" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
